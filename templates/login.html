<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 发布管理平台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>发布管理平台</h1>
                <p class="login-slogan">统一管理多项目多分支<br>驱动 Jenkins 构建与部署</p>
            </div>
            <div class="login-features">
                <div class="feature-item">
                    <span class="feature-icon">&#9670;</span>
                    <span>多项目 / 多分支统一管理</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">&#9670;</span>
                    <span>一键触发 Jenkins 构建</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">&#9670;</span>
                    <span>构建状态实时追踪</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-box">
                <h2>欢迎登录</h2>
                <p class="subtitle">请输入账号密码以继续</p>
                {{if .Error}}
                <div class="alert alert-error">
                    <span>{{.Error}}</span>
                </div>
                {{end}}
                <form method="POST" action="/login">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required autofocus>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">登 录</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
